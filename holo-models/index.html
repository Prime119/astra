<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FALCON // HOLO-MODELOS — Biblioteca 3D CFE</title>
<style>
  :root{--bg:#040810;--hud:#22d3ee;--glow:#67e8f9;--hud-dk:#0e7490;--text:#cdeffb;--muted:#6b8597;}
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--text);
    font-family:'Consolas','Courier New',monospace;overflow:hidden;}
  #app{position:fixed;inset:0;}
  canvas{display:block;}
  #topbar{position:fixed;top:0;left:0;right:0;height:46px;z-index:10;pointer-events:none;
    display:flex;align-items:center;gap:14px;padding:0 18px;
    background:linear-gradient(180deg,rgba(8,26,40,.85),rgba(4,8,16,0));}
  #topbar .mark{color:var(--glow);font-weight:900;font-size:16px;letter-spacing:3px;text-shadow:0 0 10px var(--hud);}
  #topbar .sub{color:var(--hud);font-size:11px;letter-spacing:2px;}
  #topbar .spacer{flex:1;}
  #topbar .dot{color:#10b981;font-size:11px;font-weight:bold;letter-spacing:1px;}

  /* Tarjeta de info (derecha) */
  #card{position:fixed;top:64px;right:18px;width:260px;z-index:10;
    background:rgba(7,20,32,.8);border:1px solid var(--hud-dk);border-radius:8px;padding:12px 14px;
    box-shadow:0 0 22px rgba(34,211,238,.18);}
  #card .name{color:var(--glow);font-weight:bold;font-size:14px;letter-spacing:1px;}
  #card .type{color:var(--muted);font-size:11px;margin:2px 0 10px;}
  #card .row{display:flex;justify-content:space-between;font-size:11px;margin:4px 0;color:var(--muted);}
  #card .row b{color:var(--text);}
  #card .bar{height:5px;background:#0c2230;border-radius:3px;margin-top:3px;overflow:hidden;}
  #card .bar > i{display:block;height:100%;background:linear-gradient(90deg,#0e7490,#22d3ee);}

  /* Selector de modelos (abajo) */
  #picker{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);z-index:10;
    display:flex;gap:8px;flex-wrap:wrap;justify-content:center;max-width:92vw;
    background:rgba(7,20,32,.7);border:1px solid var(--hud-dk);border-radius:10px;padding:8px;}
  #picker button{background:#0a1c2b;border:1px solid var(--hud-dk);color:var(--muted);
    font-family:inherit;font-size:11px;letter-spacing:.5px;padding:7px 11px;border-radius:6px;cursor:pointer;}
  #picker button:hover{color:var(--text);border-color:var(--hud);}
  #picker button.active{color:#04121b;background:var(--hud);border-color:var(--glow);font-weight:bold;
    box-shadow:0 0 12px rgba(34,211,238,.5);}
  #hint{position:fixed;bottom:70px;left:50%;transform:translateX(-50%);z-index:10;pointer-events:none;
    color:var(--muted);font-size:11px;}
</style>
</head>
<body>
<div id="app"></div>
<div id="topbar">
  <span class="mark">◤ FALCON</span>
  <span class="sub">// HOLO-MODELOS — BIBLIOTECA 3D · CFE</span>
  <span class="spacer"></span>
  <span class="dot">● HOLOGRAMA ACTIVO</span>
</div>
<div id="card">
  <div class="name" id="cName">—</div>
  <div class="type" id="cType">—</div>
  <div class="row"><span>Estado</span><b id="cEstado">NOMINAL</b></div>
  <div class="row"><span>Carga</span><b id="cCarga">—</b></div>
  <div class="bar"><i id="cBar" style="width:80%"></i></div>
</div>
<div id="hint">Arrastra para rotar · rueda para zoom · elige un modelo abajo</div>
<div id="picker"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script>
const HUD=0x22d3ee, GLOW=0x67e8f9;

// ---------- Escena ----------
const scene=new THREE.Scene();
scene.background=new THREE.Color(0x040810);
scene.fog=new THREE.FogExp2(0x040810,0.018);
const camera=new THREE.PerspectiveCamera(50, innerWidth/innerHeight, 0.1, 1000);
camera.position.set(9,7,13);
const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setPixelRatio(devicePixelRatio); renderer.setSize(innerWidth,innerHeight);
document.getElementById('app').appendChild(renderer.domElement);
const controls=new THREE.OrbitControls(camera,renderer.domElement);
controls.enableDamping=true; controls.dampingFactor=0.08; controls.target.set(0,3,0);
controls.maxPolarAngle=Math.PI*0.49; controls.minDistance=5; controls.maxDistance=40;

// ---------- Helpers holográficos ----------
function holo(geo,{color=HUD,wire=false,fill=0.05,edge=0.9,thr=20}={}){
  const g=new THREE.Group();
  if(fill>0){
    g.add(new THREE.Mesh(geo,new THREE.MeshBasicMaterial({color,transparent:true,opacity:fill,
      blending:THREE.AdditiveBlending,depthWrite:false,side:THREE.DoubleSide})));
  }
  const lg = wire ? new THREE.WireframeGeometry(geo) : new THREE.EdgesGeometry(geo,thr);
  g.add(new THREE.LineSegments(lg,new THREE.LineBasicMaterial({color,transparent:true,opacity:edge})));
  return g;
}
function segs(list,color=HUD,op=0.85){ // list: [x1,y1,z1,x2,y2,z2,...]
  const geo=new THREE.BufferGeometry();
  geo.setAttribute('position',new THREE.Float32BufferAttribute(list,3));
  return new THREE.LineSegments(geo,new THREE.LineBasicMaterial({color,transparent:true,opacity:op}));
}
function ring(r,y=0.05,color=HUD,op=0.5,seg=64){
  const pts=[];for(let i=0;i<=seg;i++){const a=i/seg*Math.PI*2;pts.push(new THREE.Vector3(Math.cos(a)*r,y,Math.sin(a)*r));}
  return new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts),
    new THREE.LineBasicMaterial({color,transparent:true,opacity:op}));
}

// ---------- Terreno plexus (malla cian) ----------
const terrain=new THREE.Group();
(function(){
  const N=44, S=80, pts=[], seg=[];
  const H=(x,z)=>Math.sin(x*0.25)*0.6+Math.cos(z*0.22)*0.6+Math.sin((x+z)*0.13)*0.5;
  const grid=[];
  for(let i=0;i<=N;i++){grid[i]=[];for(let j=0;j<=N;j++){
    const x=(i/N-0.5)*S, z=(j/N-0.5)*S, y=H(x,z)-2.5;
    grid[i][j]=new THREE.Vector3(x,y,z); pts.push(x,y,z);
  }}
  for(let i=0;i<=N;i++)for(let j=0;j<=N;j++){
    if(i<N){const a=grid[i][j],b=grid[i+1][j];seg.push(a.x,a.y,a.z,b.x,b.y,b.z);}
    if(j<N){const a=grid[i][j],b=grid[i][j+1];seg.push(a.x,a.y,a.z,b.x,b.y,b.z);}
  }
  terrain.add(segs(seg,0x0e6b85,0.35));
  const pg=new THREE.BufferGeometry(); pg.setAttribute('position',new THREE.Float32BufferAttribute(pts,3));
  terrain.add(new THREE.Points(pg,new THREE.PointsMaterial({color:GLOW,size:0.18,transparent:true,opacity:0.7})));
})();
scene.add(terrain);

// Anillos HUD en la base del modelo
const baseRings=new THREE.Group();
baseRings.add(ring(4.2,-1.9,HUD,0.5)); baseRings.add(ring(5.6,-1.9,GLOW,0.25)); baseRings.add(ring(3.1,-1.9,HUD,0.3));
scene.add(baseRings);

// Partículas que ascienden
const motes=(function(){
  const n=120,p=[];for(let i=0;i<n;i++)p.push((Math.random()-0.5)*16,Math.random()*14-2,(Math.random()-0.5)*16);
  const g=new THREE.BufferGeometry();g.setAttribute('position',new THREE.Float32BufferAttribute(p,3));
  const m=new THREE.Points(g,new THREE.PointsMaterial({color:GLOW,size:0.1,transparent:true,opacity:0.5}));
  scene.add(m);return m;
})();

// ---------- Modelos por tipo ----------
const spin=[]; // objetos que rotan (aspas, etc.)
function clearSpin(){spin.length=0;}

function mAerogenerador(){ // central eólica
  const g=new THREE.Group(); clearSpin();
  const tower=holo(new THREE.CylinderGeometry(0.16,0.28,9,12)); tower.position.y=2.0; g.add(tower);
  const nacelle=holo(new THREE.BoxGeometry(1.4,0.7,0.7)); nacelle.position.y=6.7; g.add(nacelle);
  const hub=new THREE.Group(); hub.position.set(0,6.7,0.5);
  hub.add(holo(new THREE.ConeGeometry(0.25,0.5,10),{})); 
  for(let k=0;k<3;k++){
    const blade=holo(new THREE.BoxGeometry(0.18,4.2,0.5),{}); blade.position.y=2.1; 
    const arm=new THREE.Group(); arm.add(blade); arm.rotation.z=k*Math.PI*2/3; hub.add(arm);
  }
  g.add(hub); spin.push({obj:hub,axis:'z',speed:0.9});
  g.add(ring(2.4,6.7,HUD,0.3).rotateX(Math.PI/2)); // anillo HUD frontal
  return g;
}
function mTorreTransmision(){ // pilón de transmisión (lattice) + líneas
  const g=new THREE.Group(); clearSpin();
  const H=9,b=1.7,t=0.55, lv=[0,2.2,4.4,6.0,7.4,H];
  const w=y=>b+(t-b)*(y/H);
  const corner=(y,sx,sz)=>[sx*w(y),y,sz*w(y)];
  const s=[];
  const C=[[1,1],[1,-1],[-1,-1],[-1,1]];
  for(let c=0;c<4;c++){for(let i=0;i<lv.length-1;i++){
    const a=corner(lv[i],C[c][0],C[c][1]),d=corner(lv[i+1],C[c][0],C[c][1]); s.push(...a,...d);
  }}
  for(const y of lv){for(let c=0;c<4;c++){const a=corner(y,C[c][0],C[c][1]),d=corner(y,C[(c+1)%4][0],C[(c+1)%4][1]);s.push(...a,...d);}}
  for(let i=0;i<lv.length-1;i++){for(let c=0;c<4;c++){
    const a=corner(lv[i],C[c][0],C[c][1]),d=corner(lv[i+1],C[(c+1)%4][0],C[(c+1)%4][1]);s.push(...a,...d);
  }}
  // crucetas (crossarms)
  const arms=[6.0,7.4,8.6];
  arms.forEach(y=>{const ww=w(y)+2.2; s.push(-ww,y,0, ww,y,0); 
    s.push(-ww,y,0,-ww,y-0.5,0, ww,y,0,ww,y-0.5,0,  -ww*0.5,y,0,-ww*0.5,y-0.45,0, ww*0.5,y,0,ww*0.5,y-0.45,0);});
  g.add(segs(s,HUD,0.85));
  // conductores (líneas con catenaria) a ambos lados, a lo largo de Z
  const cond=[]; const ends=[];
  arms.forEach(y=>{const ww=w(y)+2.2;[-ww,-ww*0.5,ww*0.5,ww].forEach(x=>ends.push([x,y-0.5]));});
  const Z=15, sag=1.1;
  const yAt=(y0,z)=>y0 - sag*(1-(z/Z)*(z/Z));   // catenaria simple
  ends.forEach(([x,y0])=>{ for(let z=-Z;z<Z;z++){ cond.push(x,yAt(y0,z),z, x,yAt(y0,z+1),z+1); } });
  g.add(segs(cond,GLOW,0.4));
  return g;
}
function mTorreEnfriamiento(){ // hiperboloide (termo / nuclear)
  clearSpin(); const g=new THREE.Group();
  const prof=[];for(let i=0;i<=14;i++){const t=i/14;const y=t*8;const r=2.6 - Math.sin(t*Math.PI)*1.1 + (t>0.7?(t-0.7)*1.2:0);prof.push(new THREE.Vector2(Math.max(0.9,r),y));}
  const geo=new THREE.LatheGeometry(prof,40);
  g.add(holo(geo,{wire:true,edge:0.5,fill:0.04}));
  g.add(ring(2.7,0.05,HUD,0.6)); g.add(ring(1.9,8.0,GLOW,0.5));
  return g;
}
function mSubestacion(){
  clearSpin(); const g=new THREE.Group();
  for(let k=-1;k<=1;k++){const tr=holo(new THREE.BoxGeometry(1.1,1.4,1.1)); tr.position.set(k*2.4,0.7,0); g.add(tr);
    g.add(holo(new THREE.CylinderGeometry(0.06,0.06,1.0,6)).translateX(k*2.4).translateY(1.9));}
  // pórtico (busbars)
  const s=[];const X=4.2,Y=3.4;
  [-X,-1.4,1.4,X].forEach(x=>{s.push(x,0,-1.5,x,Y,-1.5,x,0,1.5,x,Y,1.5);});
  [-1.5,1.5].forEach(z=>{s.push(-X,Y,z,X,Y,z); s.push(-X,Y-0.6,z,X,Y-0.6,z);});
  g.add(segs(s,HUD,0.85));
  g.add(ring(3.4,0.05,HUD,0.4));
  return g;
}
function mSolar(){
  clearSpin(); const g=new THREE.Group();
  for(let r=-1;r<=1;r++)for(let c=-2;c<=2;c++){
    const p=holo(new THREE.BoxGeometry(1.6,0.06,1.0),{}); p.position.set(c*2.0,1.0,r*2.4); p.rotation.x=-0.5; g.add(p);
    g.add(holo(new THREE.CylinderGeometry(0.04,0.04,1.0,6)).translateX(c*2.0).translateZ(r*2.4).translateY(0.5));
  }
  g.add(ring(5.2,0.05,HUD,0.35));
  return g;
}
function mEdificio(){ // oficinas
  clearSpin(); const g=new THREE.Group();
  const b=holo(new THREE.BoxGeometry(3,5,3)); b.position.y=2.5; g.add(b);
  const s=[];for(let f=1;f<5;f++){s.push(-1.5,f,1.5,1.5,f,1.5,-1.5,f,-1.5,1.5,f,-1.5,1.5,f,-1.5,1.5,f,1.5,-1.5,f,-1.5,-1.5,f,1.5);}
  g.add(segs(s,HUD,0.5));
  g.add(ring(2.8,0.05,HUD,0.4));
  return g;
}
function mPresa(){ // hidroeléctrica (presa en arco)
  clearSpin(); const g=new THREE.Group();
  const prof=[new THREE.Vector2(0.2,0),new THREE.Vector2(1.4,0),new THREE.Vector2(0.7,5),new THREE.Vector2(0.2,5)];
  const wall=holo(new THREE.LatheGeometry(prof,32,Math.PI*0.25,Math.PI*0.5),{wire:true,edge:0.6,fill:0.05});
  wall.scale.set(3,1,3); wall.position.y=0; g.add(wall);
  const water=holo(new THREE.CircleGeometry(6,40,Math.PI*0.25,Math.PI*0.5),{wire:true,edge:0.25,fill:0.06,color:GLOW});
  water.rotation.x=-Math.PI/2; water.position.y=4.6; water.scale.set(1.2,1.2,1.2); g.add(water);
  return g;
}
function mNuclear(){ // domo + torre de enfriamiento
  clearSpin(); const g=new THREE.Group();
  const dome=holo(new THREE.SphereGeometry(2,24,16,0,Math.PI*2,0,Math.PI/2),{wire:true,edge:0.5,fill:0.05});
  dome.position.set(-2.6,0,0); g.add(dome);
  g.add(holo(new THREE.CylinderGeometry(2,2,0.4,24)).translateX(-2.6).translateY(0.2));
  const ct=mTorreEnfriamiento(); ct.scale.set(0.7,0.7,0.7); ct.position.set(3.0,0,0); g.add(ct);
  g.add(ring(3.6,0.05,HUD,0.4));
  return g;
}

const MODELS={
  aerogenerador:{f:mAerogenerador,name:"Aerogenerador",type:"Central Eólica"},
  transmision:{f:mTorreTransmision,name:"Torre de Transmisión",type:"Líneas / Pilón"},
  enfriamiento:{f:mTorreEnfriamiento,name:"Torre de Enfriamiento",type:"Termoeléctrica"},
  subestacion:{f:mSubestacion,name:"Subestación",type:"Transformación"},
  solar:{f:mSolar,name:"Planta Solar",type:"Fotovoltaica"},
  presa:{f:mPresa,name:"Presa / Hidroeléctrica",type:"Generación Hidráulica"},
  edificio:{f:mEdificio,name:"Oficinas CFE",type:"Administrativo"},
  nuclear:{f:mNuclear,name:"Central Nuclear",type:"Reactor + Enfriamiento"},
};

let current=null;
function show(key){
  if(current){scene.remove(current);} clearSpin();
  current=MODELS[key].f(); scene.add(current);
  document.getElementById('cName').textContent=MODELS[key].name;
  document.getElementById('cType').textContent=MODELS[key].type+" · CFE";
  const carga=40+Math.floor(Math.random()*60);
  document.getElementById('cCarga').textContent=carga+"%";
  document.getElementById('cBar').style.width=carga+"%";
  [...document.querySelectorAll('#picker button')].forEach(b=>b.classList.toggle('active',b.dataset.k===key));
}
// Botones
const picker=document.getElementById('picker');
Object.entries(MODELS).forEach(([k,v])=>{
  const b=document.createElement('button'); b.textContent=v.name; b.dataset.k=k;
  b.onclick=()=>show(k); picker.appendChild(b);
});
show('aerogenerador');

// ---------- Animación ----------
function animate(){
  requestAnimationFrame(animate);
  const t=performance.now()*0.001;
  spin.forEach(s=>{ s.obj.rotation[s.axis]+=s.speed*0.016; });
  baseRings.rotation.y=t*0.15;
  // motes ascienden
  const pos=motes.geometry.attributes.position;
  for(let i=0;i<pos.count;i++){let y=pos.getY(i)+0.02; if(y>12)y=-2; pos.setY(i,y);} pos.needsUpdate=true;
  controls.update(); renderer.render(scene,camera);
}
animate();
addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);});
</script>
</body>
</html>
