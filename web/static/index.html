<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>ASTRA</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--bg:#030608;--panel:rgba(8,14,22,.9);--border:rgba(79,195,247,.06);--text:#8a9bb0;
  --text-h:#e4ecf5;--cyan:#4fc3f7;--glow:rgba(79,195,247,.25);}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;
  height:100vh;display:flex;flex-direction:column;overflow:hidden;}

/* === 3D CANVAS (fondo holográfico) === */
#three-canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;}

/* === HEADER === */
#header{padding:10px 24px;display:flex;align-items:center;gap:12px;z-index:10;
  background:rgba(3,6,8,.7);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);}
#header h1{color:var(--cyan);font-size:15px;font-weight:600;letter-spacing:4px;
  text-shadow:0 0 10px rgba(79,195,247,.3);}
#header .status{margin-left:auto;font-size:10px;color:var(--text);display:flex;align-items:center;gap:6px;}
#header .dot{width:6px;height:6px;border-radius:50%;background:var(--cyan);box-shadow:0 0 8px var(--cyan);}
#header .dot.off{background:#c15f5f;box-shadow:none;}

/* === CHAT === */
#chat-zone{flex:1;display:flex;flex-direction:column;position:relative;z-index:5;overflow:hidden;}
#chat{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:10px;padding:16px 28px;scroll-behavior:smooth;}
#chat::-webkit-scrollbar{width:3px;}
#chat::-webkit-scrollbar-track{background:transparent;}
#chat::-webkit-scrollbar-thumb{background:rgba(79,195,247,.12);border-radius:3px;}
#chat::-webkit-scrollbar-thumb:hover{background:rgba(79,195,247,.25);}

.msg{max-width:65%;padding:11px 16px;border-radius:16px;font-size:13.5px;line-height:1.6;
  animation:fadeIn .25s ease;word-wrap:break-word;}
.msg-user{align-self:flex-end;background:rgba(79,195,247,.06);border:1px solid rgba(79,195,247,.12);
  color:var(--text-h);border-bottom-right-radius:3px;}
.msg-astra{align-self:flex-start;background:rgba(10,20,35,.8);border:1px solid rgba(79,195,247,.08);
  color:var(--text-h);border-bottom-left-radius:3px;backdrop-filter:blur(6px);
  box-shadow:0 2px 20px rgba(0,0,0,.3);}
.msg-sistema{align-self:center;color:var(--text);font-size:9.5px;opacity:.4;font-style:italic;}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}

/* === INPUT BAR === */
#input-bar{padding:12px 24px;display:flex;gap:8px;align-items:center;z-index:10;
  background:rgba(3,6,8,.75);backdrop-filter:blur(12px);border-top:1px solid var(--border);}
#input-bar input{flex:1;background:rgba(10,18,28,.7);border:1px solid rgba(79,195,247,.08);
  color:var(--text-h);padding:11px 16px;border-radius:12px;font-size:13px;outline:none;transition:.2s;}
#input-bar input:focus{border-color:rgba(79,195,247,.25);box-shadow:0 0 0 2px rgba(79,195,247,.04);}
.btn-action{background:rgba(10,18,28,.6);border:1px solid rgba(79,195,247,.1);color:var(--cyan);
  width:38px;height:38px;border-radius:10px;cursor:pointer;font-size:14px;display:flex;
  align-items:center;justify-content:center;transition:.2s;}
.btn-action:hover{border-color:rgba(79,195,247,.3);background:rgba(79,195,247,.04);}
.btn-action.active{background:rgba(79,195,247,.1);border-color:var(--cyan);box-shadow:0 0 8px rgba(79,195,247,.15);}
#btn-send{background:linear-gradient(135deg,#4fc3f7,#0288d1);color:#fff;border:none;
  padding:10px 18px;border-radius:10px;font-weight:600;cursor:pointer;font-size:11.5px;
  letter-spacing:.5px;transition:.15s;box-shadow:0 2px 12px rgba(79,195,247,.2);}
#btn-send:hover{filter:brightness(1.1);box-shadow:0 4px 20px rgba(79,195,247,.3);}
#btn-mic.grabando{background:rgba(200,80,80,.15);border-color:#e57373;color:#e57373;animation:pulsoBtn 1.2s infinite;}
@keyframes pulsoBtn{0%,100%{box-shadow:0 0 0 0 rgba(229,115,115,.3);}50%{box-shadow:0 0 0 8px rgba(229,115,115,0);}}

/* === INFO BAR === */
#info-bar{padding:5px 24px;display:flex;gap:10px;font-size:9px;color:var(--text);
  justify-content:center;flex-wrap:wrap;opacity:.5;z-index:10;}
#info-bar span{padding:2px 7px;background:rgba(10,18,28,.4);border-radius:3px;}

/* === CÁMARA === */
#cam-preview{display:none;position:fixed;top:48px;left:16px;width:130px;height:98px;
  border-radius:8px;border:1px solid rgba(79,195,247,.15);opacity:.8;z-index:20;
  box-shadow:0 4px 20px rgba(0,0,0,.5);}
</style>
</head>
<body>

<!-- THREE.JS CANVAS -->
<canvas id="three-canvas"></canvas>

<!-- HEADER -->
<div id="header">
  <h1>ASTRA</h1>
  <div class="status"><span class="dot" id="dot-status"></span><span id="status-text">En línea</span></div>
</div>

<!-- CHAT -->
<div id="chat-zone"><div id="chat"></div></div>

<!-- PANEL DE SIMULACIÓN 3D (ventana flotante pequeña) -->
<div id="sim-panel" style="display:none;position:fixed;top:50px;right:20px;width:400px;height:320px;z-index:15;background:rgba(3,6,8,.95);border-radius:12px;border:1px solid rgba(79,195,247,.2);box-shadow:0 8px 40px rgba(0,0,0,.6);">
  <canvas id="sim-canvas" style="width:100%;height:100%;border-radius:12px;"></canvas>
  <button onclick="cerrarSimulacion()" style="position:absolute;top:8px;right:10px;background:rgba(200,80,80,.8);color:#fff;border:none;padding:4px 10px;border-radius:6px;cursor:pointer;font-size:10px;z-index:16;">X</button>
  <div id="sim-label" style="position:absolute;bottom:8px;left:50%;transform:translateX(-50%);color:var(--cyan);font-size:9px;opacity:.6;"></div>
</div>

<!-- INPUT -->
<div id="input-bar">
  <button class="btn-action" id="btn-mic" onclick="escuchar()" title="Hablar">🎙️</button>
  <button class="btn-action" id="btn-conv" onclick="toggleConversacion()" title="Conversación continua">💬</button>
  <input id="input" placeholder="Escribe algo o activa el modo conversación..." />
  <button id="btn-send" onclick="enviar()">ENVIAR</button>
  <button class="btn-action" id="btn-cam" onclick="toggleCamara()" title="Cámara">📷</button>
  <button class="btn-action" id="btn-voz" onclick="toggleVoz()" title="Voz">🔊</button>
</div>
<div id="info-bar">
  <span id="info-emocion"></span><span id="info-hora"></span><span id="info-cpu"></span><span id="info-ram"></span>
</div>
<video id="cam-preview" autoplay muted></video>

<!-- THREE.JS CDN -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ======================== THREE.JS 3D ORB — ESFERA DE DYSON ========================
var scene, camera, renderer, orb, rings=[], particles, energyPulses=[];
var orbScale=1, targetScale=1, glowIntensity=0.3, targetGlow=0.3;
var ringSpeed=1, targetRingSpeed=1;

function init3D(){
  var canvas=document.getElementById('three-canvas');
  scene=new THREE.Scene();
  camera=new THREE.PerspectiveCamera(55,window.innerWidth/window.innerHeight,0.1,100);
  camera.position.z=5;
  renderer=new THREE.WebGLRenderer({canvas:canvas,alpha:true,antialias:true});
  renderer.setSize(window.innerWidth,window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));

  // Nucleo central
  orb=new THREE.Mesh(new THREE.SphereGeometry(0.3,64,64),new THREE.MeshBasicMaterial({color:0x4fc3f7,transparent:true,opacity:0.2}));
  scene.add(orb);
  orb.add(new THREE.Mesh(new THREE.SphereGeometry(0.12,32,32),new THREE.MeshBasicMaterial({color:0xe1f5fe,transparent:true,opacity:0.7})));
  orb.add(new THREE.Mesh(new THREE.SphereGeometry(0.45,32,32),new THREE.MeshBasicMaterial({color:0x4fc3f7,transparent:true,opacity:0.04})));

  // ANILLOS ESFERA DE DYSON — cada uno en eje diferente, como giroscopio
  var configs=[
    {r:0.8,t:0.012,ax:[1,0,0],sp:0.008,d:1,c:0x4fc3f7},
    {r:1.0,t:0.010,ax:[0,1,0],sp:0.012,d:-1,c:0x4dd0e1},
    {r:1.2,t:0.009,ax:[0.7,0.7,0],sp:0.006,d:1,c:0x80deea},
    {r:1.4,t:0.010,ax:[0,0.5,1],sp:0.010,d:-1,c:0x4fc3f7},
    {r:1.6,t:0.007,ax:[1,0,0.7],sp:0.014,d:1,c:0xb2ebf2},
    {r:1.8,t:0.008,ax:[0.5,1,0.3],sp:0.005,d:-1,c:0x4fc3f7},
    {r:2.0,t:0.006,ax:[0.3,0.7,1],sp:0.009,d:1,c:0x80deea},
  ];
  configs.forEach(function(cfg){
    var ring=new THREE.Mesh(new THREE.TorusGeometry(cfg.r,cfg.t,16,128),new THREE.MeshBasicMaterial({color:cfg.c,transparent:true,opacity:0.12}));
    var axis=new THREE.Vector3(cfg.ax[0],cfg.ax[1],cfg.ax[2]).normalize();
    ring.quaternion.setFromAxisAngle(axis,Math.random()*Math.PI*2);
    ring._axis=axis;ring._speed=cfg.sp;ring._dir=cfg.d;ring._baseOp=0.12;
    rings.push(ring);scene.add(ring);
  });

  // Particulas ambientales
  var pg=new THREE.BufferGeometry();var pc=350;var pp=new Float32Array(pc*3);
  for(var i=0;i<pc*3;i++)pp[i]=(Math.random()-0.5)*8;
  pg.setAttribute('position',new THREE.BufferAttribute(pp,3));
  particles=new THREE.Points(pg,new THREE.PointsMaterial({color:0x4fc3f7,size:0.018,transparent:true,opacity:0.4}));
  scene.add(particles);

  // Pulsos de energia
  for(var i=0;i<4;i++){
    var p=new THREE.Mesh(new THREE.TorusGeometry(0.4,0.02,8,64),new THREE.MeshBasicMaterial({color:0x4fc3f7,transparent:true,opacity:0}));
    p._active=false;p._scale=1;energyPulses.push(p);scene.add(p);
  }

  window.addEventListener('resize',function(){camera.aspect=window.innerWidth/window.innerHeight;camera.updateProjectionMatrix();renderer.setSize(window.innerWidth,window.innerHeight);});
  animate3D();
}

function animate3D(){
  requestAnimationFrame(animate3D);
  var t=Date.now()*0.001;
  orbScale+=(targetScale-orbScale)*0.04;
  glowIntensity+=(targetGlow-glowIntensity)*0.03;
  ringSpeed+=(targetRingSpeed-ringSpeed)*0.02;

  // Nucleo pulsa
  var p=1+Math.sin(t*2)*0.04*glowIntensity;
  orb.scale.set(orbScale*p,orbScale*p,orbScale*p);
  orb.material.opacity=0.15+glowIntensity*0.15;
  orb.children[0].material.opacity=0.5+glowIntensity*0.4;

  // ANILLOS DYSON — giran en sus propios ejes como giroscopio
  rings.forEach(function(ring,i){
    var sp=ring._speed*ringSpeed*ring._dir;
    var wobble=Math.sin(t*0.5+i)*0.0008;
    ring.rotateOnWorldAxis(ring._axis,sp+wobble);
    ring.material.opacity=ring._baseOp+glowIntensity*0.12;
  });

  // Particulas se agitan al pensar/hablar
  particles.rotation.y+=0.0002*ringSpeed;
  if(ringSpeed>2){var pos=particles.geometry.attributes.position.array;for(var i=0;i<pos.length;i+=3){pos[i]+=(Math.random()-0.5)*0.002*ringSpeed;pos[i+1]+=(Math.random()-0.5)*0.002*ringSpeed;}particles.geometry.attributes.position.needsUpdate=true;}

  // Pulsos de energia
  energyPulses.forEach(function(ep){if(ep._active){ep._scale+=0.05;ep.scale.set(ep._scale,ep._scale,ep._scale);ep.material.opacity=Math.max(0,0.35-ep._scale*0.06);ep.rotation.x+=0.02;if(ep._scale>5){ep._active=false;ep._scale=1;ep.scale.set(1,1,1);ep.material.opacity=0;}}});

  renderer.render(scene,camera);
}

function dispararPulso(){for(var i=0;i<energyPulses.length;i++){if(!energyPulses[i]._active){energyPulses[i]._active=true;energyPulses[i]._scale=1;energyPulses[i].rotation.set(Math.random()*Math.PI,Math.random()*Math.PI,0);break;}}}

// Estados: PENSAR = giran MUY rapido (procesando), HABLAR = rapido + pulsos, IDLE = lento
function orb3D_hablar(){targetScale=1.15;targetGlow=0.85;targetRingSpeed=3;dispararPulso();}
function orb3D_pensar(){targetScale=0.95;targetGlow=0.6;targetRingSpeed=8;} // rapido al procesar
function orb3D_idle(){targetScale=1;targetGlow=0.3;targetRingSpeed=1;}

init3D();

// ======================== CHAT LOGIC ========================
var chat = document.getElementById('chat');
var input = document.getElementById('input');

function agregarMsg(texto, tipo){
  var div = document.createElement('div');
  div.className = 'msg msg-'+tipo;
  div.textContent = texto;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function enviar(){
  var texto = input.value.trim();
  if(!texto) return;
  input.value = '';
  agregarMsg(texto, 'user');
  orb3D_pensar();

  // Intentar streaming primero (más rápido visualmente)
  var div = document.createElement('div');
  div.className = 'msg msg-astra';
  div.textContent = '';
  chat.appendChild(div);
  
  var fullResp = '';
  var audioUrl = null;
  
  fetch('/api/chat', {method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({texto:texto})})
    .then(r=>r.json()).then(d=>{
      orb3D_hablar();
      div.textContent = d.respuesta;
      fullResp = d.respuesta;
      chat.scrollTop = chat.scrollHeight;
      hablar(d.respuesta, d.audio);
      if(d.simulacion){ setTimeout(function(){ lanzarSimulacion(d.simulacion); }, 300); }
      setTimeout(()=>{ orb3D_idle(); }, 8000);
    }).catch(e=>{
      orb3D_idle();
      div.textContent = 'Error de conexión: '+e;
      div.className = 'msg msg-sistema';
    });
}
input.addEventListener('keydown', e=>{ if(e.key==='Enter') enviar(); });

// ======================== VOZ TTS ========================
var vozActiva=true, audioActual=null;
var colaAudio = []; // Cola de audios pendientes
var reproduciendo = false;

// Mantener AudioContext vivo
var audioCtx = null;
function getAudioCtx(){
  if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  if(audioCtx.state==='suspended') audioCtx.resume();
  return audioCtx;
}
document.addEventListener('click', function(){getAudioCtx();}, {once:true});
document.addEventListener('keydown', function(){getAudioCtx();}, {once:true});

function hablar(texto, audioUrl){
  if(!vozActiva) return;
  if(texto.includes('timed out')||texto.includes('[Astra]')||texto.includes('Error:')) return;
  // Agregar a la cola en vez de reproducir directamente
  colaAudio.push({texto: texto, url: audioUrl});
  procesarColaAudio();
}

function procesarColaAudio(){
  if(reproduciendo || colaAudio.length === 0) return;
  reproduciendo = true;
  var item = colaAudio.shift();
  if(item.url){
    reproducirAudio(item.url);
  } else {
    hablarNavegador(item.texto);
  }
}

function audioTermino(){
  orb3D_idle();
  audioActual = null;
  reproduciendo = false;
  // Pequeña pausa entre audios para que suene natural
  setTimeout(procesarColaAudio, 200);
}

function reproducirAudio(url){
  if(audioActual){audioActual.pause();audioActual=null;}
  getAudioCtx();
  orb3D_hablar();
  audioActual=new Audio(url);
  audioActual.playbackRate = 1.1; // un poco más rápido para sonar más natural
  audioActual.onended = audioTermino;
  audioActual.onerror = audioTermino;
  audioActual.play().catch(audioTermino);
}

var vozFem=null;
function buscarVoz(){
  var voces=speechSynthesis.getVoices(); if(!voces||!voces.length)return;
  var masc=['raul','jorge','diego','pedro','alvaro','pablo','saul','alonso','arnau','hector'];
  var c=voces.filter(function(v){if(!v.lang.startsWith('es'))return false;var n=v.name.toLowerCase();return!masc.some(function(m){return n.includes(m);});});
  var o=c.find(function(v){var n=v.name.toLowerCase();return n.includes('online')||n.includes('natural');});
  vozFem=o||c[0]||null;
}
if(window.speechSynthesis){speechSynthesis.onvoiceschanged=buscarVoz;buscarVoz();setTimeout(buscarVoz,1500);}

function hablarNavegador(texto){
  if(!window.speechSynthesis)return;
  var l=texto.replace(/[*#\[\]{}`<>]/g,'').replace(/\n/g,', ').trim();
  if(l.length>400)l=l.substring(0,400); if(l.length<3){audioTermino();return;}
  speechSynthesis.cancel(); orb3D_hablar();
  var u=new SpeechSynthesisUtterance(l);u.lang='es-MX';u.rate=1.12;u.pitch=1.15;
  if(vozFem)u.voice=vozFem;
  u.onend=audioTermino; u.onerror=audioTermino;
  speechSynthesis.speak(u);
}

function toggleVoz(){
  vozActiva=!vozActiva; var b=document.getElementById('btn-voz');
  b.textContent=vozActiva?'🔊':'🔇'; b.classList.toggle('active',vozActiva);
  if(!vozActiva){
    colaAudio=[]; reproduciendo=false;
    if(audioActual){audioActual.pause();audioActual=null;}
    speechSynthesis.cancel(); orb3D_idle();
  }
}

// ======================== STT ========================
var reconocimiento=null,modoConversacion=false;
var Recon=window.SpeechRecognition||window.webkitSpeechRecognition;
if(Recon){
  reconocimiento=new Recon();reconocimiento.lang='es-MX';reconocimiento.continuous=false;
  reconocimiento.onresult=function(e){input.value=e.results[0][0].transcript;document.getElementById('btn-mic').classList.remove('grabando');enviar();};
  reconocimiento.onend=function(){document.getElementById('btn-mic').classList.remove('grabando');
    if(modoConversacion){var w=setInterval(function(){if(!audioActual){clearInterval(w);setTimeout(function(){if(modoConversacion)iniciarEscucha();},400);}},200);}};
  reconocimiento.onerror=function(e){document.getElementById('btn-mic').classList.remove('grabando');
    if(modoConversacion&&e.error!=='aborted')setTimeout(function(){if(modoConversacion)iniciarEscucha();},800);};
}
function iniciarEscucha(){if(!reconocimiento)return;try{reconocimiento.start();document.getElementById('btn-mic').classList.add('grabando');}catch(e){}}
function escuchar(){if(!reconocimiento){agregarMsg('Sin soporte de voz.','sistema');return;}
  var b=document.getElementById('btn-mic');if(b.classList.contains('grabando')){reconocimiento.stop();return;}b.classList.add('grabando');reconocimiento.start();}
function toggleConversacion(){modoConversacion=!modoConversacion;var b=document.getElementById('btn-conv');
  b.classList.toggle('active',modoConversacion);
  if(modoConversacion){agregarMsg('Conversación activada.','sistema');iniciarEscucha();}
  else{try{reconocimiento.stop();}catch(e){}document.getElementById('btn-mic').classList.remove('grabando');}}

// ======================== CÁMARA ========================
var camaraActiva=false,streamCam=null,usuarioPresente=true,intCam=null;
function toggleCamara(){camaraActiva?desactivarCam():activarCam();}
function activarCam(){
  navigator.mediaDevices.getUserMedia({video:true}).then(function(s){
    streamCam=s;var v=document.getElementById('cam-preview');v.srcObject=s;v.style.display='block';
    camaraActiva=true;document.getElementById('btn-cam').classList.add('active');
    setTimeout(function(){enviarVision('camara_activada');},1500);
    intCam=setInterval(monitorPresencia,5000);
  }).catch(function(e){agregarMsg('Cámara no disponible: '+e.message,'sistema');});
}
function desactivarCam(){
  if(streamCam){streamCam.getTracks().forEach(function(t){t.stop();});streamCam=null;}
  if(intCam){clearInterval(intCam);intCam=null;}
  document.getElementById('cam-preview').style.display='none';
  camaraActiva=false;document.getElementById('btn-cam').classList.remove('active');
}
function enviarVision(ev){
  fetch('/api/vision',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({frame:null,evento:ev})}).then(r=>r.json()).then(d=>{
      if(d.respuesta){agregarMsg(d.respuesta,'astra');hablar(d.respuesta,d.audio);}
    }).catch(function(){});
}
function monitorPresencia(){
  var n=document.hasFocus();
  if(n!==usuarioPresente){usuarioPresente=n;enviarVision(n?'usuario_volvio':'usuario_se_fue');}
}

// ======================== INFO BAR ========================
var EMOJIS={neutral:'😐',feliz:'😊',emocionada:'🤩',divertida:'😄',curiosa:'🤔',orgullosa:'😌',
  apasionada:'🔥',triste:'😢',frustrada:'😤',enojada:'😠',preocupada:'😟',estresada:'😰',
  cansada:'😴',nostalgica:'🥺',satisfecha:'☺️',impaciente:'⏳'};
function actualizarInfo(){
  fetch('/api/status').then(r=>r.json()).then(d=>{
    var s=d.sistema;
    document.getElementById('info-hora').textContent=s.hora;
    document.getElementById('info-cpu').textContent='CPU '+s.cpu_uso+'%';
    document.getElementById('info-ram').textContent='RAM '+s.ram_usada_gb+'/'+s.ram_total_gb+'GB';
    document.getElementById('dot-status').className='dot '+(d.astra.brain_local_online?'':'off');
    document.getElementById('status-text').textContent=d.astra.brain_local_online?'En línea':'Offline';
    if(d.astra.emotions){var e=d.astra.emotions;document.getElementById('info-emocion').textContent=(EMOJIS[e.emocion]||'😐')+' '+e.descripcion;}
  }).catch(()=>{});
}
actualizarInfo();setInterval(actualizarInfo,30000);

// === COMPANION MODE: desactivado (no enviar mensajes proactivos al usuario) ===
// En vez de molestar, Astra investiga en silencio cuando está idle

// ======================== SIMULACIONES 3D ========================
var simScene=null,simCamera=null,simRenderer=null,simAnimId=null,animarObjetos=null;
function cerrarSimulacion(){document.getElementById('sim-panel').style.display='none';if(simAnimId)cancelAnimationFrame(simAnimId);simAnimId=null;animarObjetos=null;if(simRenderer){simRenderer.dispose();simRenderer=null;}simScene=null;}

function lanzarSimulacion(tipo){
  var panel=document.getElementById('sim-panel');panel.style.display='block';
  var canvas=document.getElementById('sim-canvas');
  if(simAnimId)cancelAnimationFrame(simAnimId);
  simScene=new THREE.Scene();
  simCamera=new THREE.PerspectiveCamera(60,canvas.clientWidth/canvas.clientHeight,0.1,1000);
  simCamera.position.z=20;
  simRenderer=new THREE.WebGLRenderer({canvas:canvas,antialias:true,alpha:true});
  simRenderer.setSize(canvas.clientWidth,canvas.clientHeight);
  simRenderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
  var code=SIM_TEMPLATES[tipo]||SIM_TEMPLATES.particulas;
  try{var fn=new Function('THREE','scene','cam',code+'\nreturn typeof animar==="function"?animar:null;');animarObjetos=fn(THREE,simScene,simCamera);}catch(e){console.error(e);}
  document.getElementById('sim-label').textContent=tipo.replace(/_/g,' ');
  animSim();
}
function animSim(){if(!simScene)return;simAnimId=requestAnimationFrame(animSim);if(animarObjetos)try{animarObjetos();}catch(e){}simRenderer.render(simScene,simCamera);}
