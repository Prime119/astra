<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>ASTRA</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#020509;color:#c8d6e5;font-family:'Segoe UI',system-ui,sans-serif;
  height:100vh;display:flex;flex-direction:column;overflow:hidden;}

#three-canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;}

/* HEADER elegante */
#header{padding:14px 30px;display:flex;align-items:center;z-index:10;
  background:linear-gradient(180deg,rgba(2,5,9,.95),rgba(2,5,9,.7));
  border-bottom:1px solid rgba(79,195,247,.04);}
#header h1{color:#4fc3f7;font-size:13px;font-weight:500;letter-spacing:6px;
  text-shadow:0 0 20px rgba(79,195,247,.4),0 0 40px rgba(79,195,247,.1);}
#header .right{margin-left:auto;display:flex;align-items:center;gap:16px;}
#header .status{font-size:9px;color:#5a7a90;display:flex;align-items:center;gap:5px;}
#header .dot{width:5px;height:5px;border-radius:50%;background:#4fc3f7;box-shadow:0 0 6px #4fc3f7;}
#header .emotion{font-size:9px;color:#4a6a80;padding:3px 10px;background:rgba(79,195,247,.04);border-radius:20px;}

/* CHAT */
#chat-zone{flex:1;position:relative;z-index:5;overflow:hidden;display:flex;flex-direction:column;}
#chat{flex:1;overflow-y:auto;padding:24px 40px;display:flex;flex-direction:column;gap:14px;}
#chat::-webkit-scrollbar{width:2px;}
#chat::-webkit-scrollbar-thumb{background:rgba(79,195,247,.1);border-radius:2px;}

.msg{max-width:60%;padding:14px 20px;border-radius:20px;font-size:13.5px;line-height:1.7;
  animation:msgIn .3s cubic-bezier(.16,1,.3,1);letter-spacing:.2px;}
.msg-user{align-self:flex-end;background:rgba(79,195,247,.05);
  border:1px solid rgba(79,195,247,.1);color:#e0eaf4;border-bottom-right-radius:4px;}
.msg-astra{align-self:flex-start;background:rgba(6,14,24,.85);
  border:1px solid rgba(79,195,247,.06);color:#d0dce8;border-bottom-left-radius:4px;
  backdrop-filter:blur(8px);box-shadow:0 4px 30px rgba(0,0,0,.3);}
.msg-sistema{align-self:center;font-size:9px;opacity:.3;font-style:italic;color:#5a7a90;}
@keyframes msgIn{from{opacity:0;transform:translateY(12px) scale(.98);}to{opacity:1;transform:none;}}

/* INPUT */
#input-bar{padding:16px 40px;display:flex;gap:10px;align-items:center;z-index:10;
  background:linear-gradient(0deg,rgba(2,5,9,.95),rgba(2,5,9,.7));
  border-top:1px solid rgba(79,195,247,.04);}
#input-bar input{flex:1;background:rgba(8,16,28,.8);border:1px solid rgba(79,195,247,.06);
  color:#e0eaf4;padding:14px 20px;border-radius:14px;font-size:13.5px;outline:none;transition:.3s;
  letter-spacing:.3px;}
#input-bar input:focus{border-color:rgba(79,195,247,.2);box-shadow:0 0 0 3px rgba(79,195,247,.03);
  background:rgba(8,16,28,.95);}
#input-bar input::placeholder{color:#3a5a70;}
#btn-send{background:linear-gradient(135deg,#4fc3f7 0%,#0288d1 100%);color:#fff;border:none;
  padding:14px 24px;border-radius:12px;font-weight:600;cursor:pointer;font-size:12px;
  letter-spacing:1px;transition:.2s;box-shadow:0 4px 20px rgba(79,195,247,.15);}
#btn-send:hover{transform:translateY(-1px);box-shadow:0 6px 30px rgba(79,195,247,.25);}
#btn-send:active{transform:translateY(0);}
#btn-voz{background:rgba(8,16,28,.6);border:1px solid rgba(79,195,247,.08);color:#4fc3f7;
  width:44px;height:44px;border-radius:12px;cursor:pointer;font-size:16px;display:flex;
  align-items:center;justify-content:center;transition:.2s;}
#btn-voz:hover{border-color:rgba(79,195,247,.2);background:rgba(79,195,247,.03);}
#btn-voz.off{color:#3a5a70;border-color:rgba(79,195,247,.03);}

/* INFO */
#info-bar{padding:6px 40px;display:flex;gap:14px;font-size:8.5px;color:#3a5a70;
  justify-content:center;z-index:10;letter-spacing:.5px;}

/* SIMULACIÓN */
#sim-panel{display:none;position:fixed;top:60px;right:30px;width:420px;height:340px;z-index:15;
  background:rgba(2,5,9,.97);border-radius:16px;border:1px solid rgba(79,195,247,.08);
  box-shadow:0 12px 60px rgba(0,0,0,.7),0 0 40px rgba(79,195,247,.03);}
#sim-canvas{width:100%;height:100%;border-radius:16px;}
#sim-close{position:absolute;top:12px;right:14px;background:rgba(200,60,60,.7);color:#fff;
  border:none;padding:5px 12px;border-radius:8px;cursor:pointer;font-size:9px;font-weight:600;
  letter-spacing:1px;transition:.2s;}
#sim-close:hover{background:rgba(200,60,60,.9);}
#sim-label{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);
  color:#4a6a80;font-size:8px;letter-spacing:1px;text-transform:uppercase;}

/* REPRODUCTOR INTEGRADO */
#media-panel{display:none;position:fixed;bottom:80px;right:30px;width:380px;height:240px;z-index:15;
  background:rgba(2,5,9,.97);border-radius:14px;border:1px solid rgba(79,195,247,.08);
  box-shadow:0 12px 60px rgba(0,0,0,.7);overflow:hidden;}
#media-panel iframe{width:100%;height:100%;border:none;border-radius:14px;}
#media-close{position:absolute;top:8px;right:10px;background:rgba(200,60,60,.7);color:#fff;
  border:none;padding:4px 10px;border-radius:6px;cursor:pointer;font-size:9px;z-index:16;
  font-weight:600;letter-spacing:.5px;}
#media-close:hover{background:rgba(200,60,60,.9);}

/* BOTÓN ADJUNTAR IMAGEN */
#btn-img{background:rgba(8,16,28,.6);border:1px solid rgba(79,195,247,.08);color:#4fc3f7;
  width:44px;height:44px;border-radius:12px;cursor:pointer;font-size:16px;display:flex;
  align-items:center;justify-content:center;transition:.2s;}
#btn-img:hover{border-color:rgba(79,195,247,.2);background:rgba(79,195,247,.03);}
#file-input{display:none;}
</style>
</head>
<body>
<canvas id="three-canvas"></canvas>

<div id="header">
  <h1>A S T R A</h1>
  <div class="right">
    <span class="emotion" id="info-emocion"></span>
    <div class="status"><span class="dot" id="dot-status"></span><span id="status-text">En línea</span></div>
  </div>
</div>

<div id="chat-zone"><div id="chat"></div></div>

<div id="sim-panel">
  <canvas id="sim-canvas"></canvas>
  <button id="sim-close" onclick="cerrarSimulacion()">CERRAR</button>
  <div id="sim-label"></div>
</div>

<div id="input-bar">
  <button id="btn-img" onclick="document.getElementById('file-input').click()" title="Enviar imagen">🖼️</button>
  <input id="file-input" type="file" accept="image/*" onchange="enviarImagen(this)"/>
  <input id="input" placeholder="Escribe algo..." autocomplete="off"/>
  <button id="btn-send" onclick="enviar()">ENVIAR</button>
  <button id="btn-voz" onclick="toggleVoz()" title="Voz">🔊</button>
</div>

<!-- Reproductor integrado -->
<div id="media-panel">
  <button id="media-close" onclick="cerrarMedia()">✕</button>
  <iframe id="media-frame" src="" allow="autoplay; encrypted-media" allowfullscreen></iframe>
</div>
<div id="info-bar">
  <span id="info-hora"></span><span id="info-cpu"></span><span id="info-ram"></span>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ======================== 3D ORB — ESFERA DE DYSON ========================
var scene,camera,renderer,orb,rings=[],particles,energyPulses=[];
var orbScale=1,targetScale=1,glowIntensity=0.3,targetGlow=0.3,ringSpeed=1,targetRingSpeed=1;

function init3D(){
  var c=document.getElementById('three-canvas');
  scene=new THREE.Scene();
  camera=new THREE.PerspectiveCamera(50,innerWidth/innerHeight,0.1,100);
  camera.position.z=5.5;
  renderer=new THREE.WebGLRenderer({canvas:c,alpha:true,antialias:true});
  renderer.setSize(innerWidth,innerHeight);
  renderer.setPixelRatio(Math.min(devicePixelRatio,2));

  orb=new THREE.Mesh(new THREE.SphereGeometry(0.28,64,64),new THREE.MeshBasicMaterial({color:0x4fc3f7,transparent:true,opacity:0.18}));
  scene.add(orb);
  orb.add(new THREE.Mesh(new THREE.SphereGeometry(0.11,32,32),new THREE.MeshBasicMaterial({color:0xe1f5fe,transparent:true,opacity:0.7})));
  orb.add(new THREE.Mesh(new THREE.SphereGeometry(0.42,32,32),new THREE.MeshBasicMaterial({color:0x4fc3f7,transparent:true,opacity:0.03})));

  var cfgs=[{r:.75,t:.01,ax:[1,0,0],sp:.007,d:1},{r:.95,t:.008,ax:[0,1,0],sp:.011,d:-1},
    {r:1.15,t:.007,ax:[.7,.7,0],sp:.005,d:1},{r:1.35,t:.009,ax:[0,.5,1],sp:.009,d:-1},
    {r:1.55,t:.006,ax:[1,0,.7],sp:.013,d:1},{r:1.75,t:.007,ax:[.5,1,.3],sp:.004,d:-1},
    {r:1.95,t:.005,ax:[.3,.7,1],sp:.008,d:1}];
  cfgs.forEach(function(cfg){
    var ring=new THREE.Mesh(new THREE.TorusGeometry(cfg.r,cfg.t,16,128),new THREE.MeshBasicMaterial({color:0x4fc3f7,transparent:true,opacity:.1}));
    var axis=new THREE.Vector3(cfg.ax[0],cfg.ax[1],cfg.ax[2]).normalize();
    ring.quaternion.setFromAxisAngle(axis,Math.random()*Math.PI*2);
    ring._axis=axis;ring._speed=cfg.sp;ring._dir=cfg.d;
    rings.push(ring);scene.add(ring);
  });

  var pg=new THREE.BufferGeometry(),pc=400,pp=new Float32Array(pc*3);
  for(var i=0;i<pc*3;i++)pp[i]=(Math.random()-.5)*9;
  pg.setAttribute('position',new THREE.BufferAttribute(pp,3));
  particles=new THREE.Points(pg,new THREE.PointsMaterial({color:0x4fc3f7,size:.014,transparent:true,opacity:.35}));
  scene.add(particles);

  for(var i=0;i<4;i++){var p=new THREE.Mesh(new THREE.TorusGeometry(.35,.015,8,64),new THREE.MeshBasicMaterial({color:0x4fc3f7,transparent:true,opacity:0}));p._active=false;p._scale=1;energyPulses.push(p);scene.add(p);}

  addEventListener('resize',function(){camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);});
  anim();
}

function anim(){
  requestAnimationFrame(anim);var t=Date.now()*.001;
  orbScale+=(targetScale-orbScale)*.04;glowIntensity+=(targetGlow-glowIntensity)*.03;ringSpeed+=(targetRingSpeed-ringSpeed)*.02;
  var p=1+Math.sin(t*2)*.03*glowIntensity;
  orb.scale.set(orbScale*p,orbScale*p,orbScale*p);
  orb.material.opacity=.15+glowIntensity*.12;
  orb.children[0].material.opacity=.5+glowIntensity*.4;
  rings.forEach(function(r,i){r.rotateOnWorldAxis(r._axis,r._speed*ringSpeed*r._dir+Math.sin(t*.5+i)*.0006);r.material.opacity=.08+glowIntensity*.1;});
  particles.rotation.y+=.0002*ringSpeed;
  if(ringSpeed>2){var pos=particles.geometry.attributes.position.array;for(var i=0;i<pos.length;i+=3){pos[i]+=(Math.random()-.5)*.002*ringSpeed;pos[i+1]+=(Math.random()-.5)*.002*ringSpeed;}particles.geometry.attributes.position.needsUpdate=true;}
  energyPulses.forEach(function(ep){if(ep._active){ep._scale+=.05;ep.scale.set(ep._scale,ep._scale,ep._scale);ep.material.opacity=Math.max(0,.3-ep._scale*.05);ep.rotation.x+=.02;if(ep._scale>5){ep._active=false;ep._scale=1;ep.scale.set(1,1,1);ep.material.opacity=0;}}});
  renderer.render(scene,camera);
}
function dispararPulso(){for(var i=0;i<energyPulses.length;i++){if(!energyPulses[i]._active){energyPulses[i]._active=true;energyPulses[i]._scale=1;energyPulses[i].rotation.set(Math.random()*Math.PI,Math.random()*Math.PI,0);break;}}}
function orb3D_hablar(){targetScale=1.12;targetGlow=.85;targetRingSpeed=3;dispararPulso();}
function orb3D_pensar(){targetScale=.92;targetGlow=.55;targetRingSpeed=7;}
function orb3D_idle(){targetScale=1;targetGlow=.3;targetRingSpeed=1;}
init3D();

// ======================== CHAT ========================
var chat=document.getElementById('chat'),input=document.getElementById('input');
function agregarMsg(t,tipo){var d=document.createElement('div');d.className='msg msg-'+tipo;d.textContent=t;chat.appendChild(d);chat.scrollTop=chat.scrollHeight;}

function enviar(){
  var t=input.value.trim();if(!t)return;input.value='';
  agregarMsg(t,'user');orb3D_pensar();
  var div=document.createElement('div');div.className='msg msg-astra';div.textContent='';chat.appendChild(div);
  fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({texto:t})})
    .then(r=>r.json()).then(d=>{orb3D_hablar();
      // Efecto typewriter: escribir letra por letra
      typewriter(div, d.respuesta, function(){
        hablar(d.respuesta,d.audio);
        if(d.simulacion)setTimeout(()=>lanzarSimulacion(d.simulacion),300);
        if(d.media)abrirMedia(d.media);
        setTimeout(orb3D_idle,6000);
      });
    })
    .catch(e=>{orb3D_idle();div.textContent='Error de conexión.';div.className='msg msg-sistema';});
}

function typewriter(el, texto, callback){
  var i=0;
  var speed = Math.max(8, Math.min(30, 1500/texto.length)); // velocidad adaptativa
  function escribir(){
    if(i<texto.length){
      el.textContent += texto.charAt(i);
      i++;
      chat.scrollTop = chat.scrollHeight;
      setTimeout(escribir, speed);
    } else {
      if(callback) callback();
    }
  }
  escribir();
}
input.addEventListener('keydown',e=>{if(e.key==='Enter')enviar();});

// ======================== VOZ ========================
var vozActiva=true,audioActual=null,colaAudio=[],reproduciendo=false;
function hablar(t,url){if(!vozActiva||t.includes('Error'))return;
  // url puede ser string o array de strings
  if(Array.isArray(url)){
    url.forEach(function(u){colaAudio.push({t:'',url:u});});
  } else {
    colaAudio.push({t,url});
  }
  procCola();
}
function procCola(){if(reproduciendo||!colaAudio.length)return;reproduciendo=true;var i=colaAudio.shift();if(i.url){repAudio(i.url);}else{repNav(i.t);}}
function finAudio(){orb3D_idle();audioActual=null;reproduciendo=false;setTimeout(procCola,150);}
function repAudio(url){if(audioActual){audioActual.pause();}orb3D_hablar();audioActual=new Audio(url);audioActual.playbackRate=1.1;audioActual.onended=finAudio;audioActual.onerror=finAudio;audioActual.play().catch(finAudio);}
var vozFem=null;
function buscarVoz(){var v=speechSynthesis.getVoices();if(!v||!v.length)return;var m=['raul','jorge','diego','pedro'];var c=v.filter(x=>x.lang.startsWith('es')&&!m.some(n=>x.name.toLowerCase().includes(n)));vozFem=c.find(x=>x.name.toLowerCase().includes('online'))||c[0]||null;}
if(window.speechSynthesis){speechSynthesis.onvoiceschanged=buscarVoz;buscarVoz();setTimeout(buscarVoz,1500);}
function repNav(t){if(!speechSynthesis)return;var l=t.replace(/[*#\[\]{}`<>]/g,'').replace(/\n/g,', ').trim();if(l.length>400)l=l.substring(0,400);if(l.length<3){finAudio();return;}speechSynthesis.cancel();orb3D_hablar();var u=new SpeechSynthesisUtterance(l);u.lang='es-MX';u.rate=1.12;u.pitch=1.15;if(vozFem)u.voice=vozFem;u.onend=finAudio;u.onerror=finAudio;speechSynthesis.speak(u);}
function toggleVoz(){vozActiva=!vozActiva;var b=document.getElementById('btn-voz');b.textContent=vozActiva?'🔊':'🔇';b.classList.toggle('off',!vozActiva);if(!vozActiva){colaAudio=[];reproduciendo=false;if(audioActual){audioActual.pause();audioActual=null;}speechSynthesis.cancel();orb3D_idle();}}

// ======================== INFO ========================
var EMOJIS={neutral:'😐',feliz:'😊',emocionada:'🤩',divertida:'😄',curiosa:'🤔',orgullosa:'😌',apasionada:'🔥',triste:'😢',frustrada:'😤',enojada:'😠',preocupada:'😟',estresada:'😰',cansada:'😴',nostalgica:'🥺',satisfecha:'☺️',impaciente:'⏳'};
function updInfo(){fetch('/api/status').then(r=>r.json()).then(d=>{var s=d.sistema;document.getElementById('info-hora').textContent=s.hora;document.getElementById('info-cpu').textContent='CPU '+s.cpu_uso+'%';document.getElementById('info-ram').textContent='RAM '+s.ram_usada_gb+'/'+s.ram_total_gb+'GB';document.getElementById('dot-status').className='dot '+(d.astra.brain_local_online?'':'off');document.getElementById('status-text').textContent=d.astra.brain_local_online?'En línea':'Offline';if(d.astra.emotions){var e=d.astra.emotions;document.getElementById('info-emocion').textContent=(EMOJIS[e.emocion]||'😐')+' '+e.descripcion;}}).catch(()=>{});}
updInfo();setInterval(updInfo,30000);

// ======================== SIMULACIONES ========================
var simScene=null,simCamera=null,simRenderer=null,simAnimId=null,animarObjetos=null;
function cerrarSimulacion(){document.getElementById('sim-panel').style.display='none';if(simAnimId)cancelAnimationFrame(simAnimId);simAnimId=null;animarObjetos=null;if(simRenderer){simRenderer.dispose();simRenderer=null;}simScene=null;}
function lanzarSimulacion(tipo){var panel=document.getElementById('sim-panel');panel.style.display='block';var canvas=document.getElementById('sim-canvas');if(simAnimId)cancelAnimationFrame(simAnimId);simScene=new THREE.Scene();simCamera=new THREE.PerspectiveCamera(60,canvas.clientWidth/canvas.clientHeight,0.1,1000);simCamera.position.z=20;simRenderer=new THREE.WebGLRenderer({canvas:canvas,antialias:true,alpha:true});simRenderer.setSize(canvas.clientWidth,canvas.clientHeight);simRenderer.setPixelRatio(Math.min(devicePixelRatio,2));var code=SIM_TEMPLATES[tipo]||SIM_TEMPLATES.particulas;try{var fn=new Function('THREE','scene','cam',code+'\nreturn typeof animar==="function"?animar:null;');animarObjetos=fn(THREE,simScene,simCamera);}catch(e){console.error(e);}document.getElementById('sim-label').textContent=tipo.replace(/_/g,' ');animSim();}
function animSim(){if(!simScene)return;simAnimId=requestAnimationFrame(animSim);if(animarObjetos)try{animarObjetos();}catch(e){}simRenderer.render(simScene,simCamera);}

var SIM_TEMPLATES={
motor:`cam.position.set(10,7,14);cam.lookAt(0,1,0);scene.add(new THREE.Mesh(new THREE.BoxGeometry(7,3.5,3.5),new THREE.MeshBasicMaterial({color:0x333333,wireframe:true})));var pis=[];var bie=[];for(var i=0;i<4;i++){scene.add(new THREE.Mesh(new THREE.CylinderGeometry(.5,.5,2.5,16),new THREE.MeshBasicMaterial({color:0x555555,wireframe:true}))).position.set(-2.5+i*1.7,3.5,0);var p=new THREE.Mesh(new THREE.CylinderGeometry(.45,.45,.5,16),new THREE.MeshBasicMaterial({color:0xbbbbbb}));p.position.set(-2.5+i*1.7,3,0);scene.add(p);pis.push(p);var b=new THREE.Mesh(new THREE.CylinderGeometry(.04,.04,2,8),new THREE.MeshBasicMaterial({color:0x4fc3f7}));b.position.set(-2.5+i*1.7,1.5,0);scene.add(b);bie.push(b);}var vol=new THREE.Mesh(new THREE.TorusGeometry(1.2,.2,12,32),new THREE.MeshBasicMaterial({color:0x777777}));vol.position.set(4.5,0,0);vol.rotation.y=Math.PI/2;scene.add(vol);var ord=[0,2,3,1];function animar(){var t=Date.now()*.004;for(var i=0;i<4;i++){var f=t+ord[i]*Math.PI/2;pis[i].position.y=3+Math.sin(f)*.9;bie[i].position.y=1.5+Math.sin(f)*.45;}vol.rotation.x+=.06;}`,
circuito:`cam.position.set(0,10,10);cam.lookAt(0,0,0);var lm=new THREE.LineBasicMaterial({color:0x4fc3f7});var pts=[[-5,0,-3],[5,0,-3],[5,0,3],[-5,0,3],[-5,0,-3]];for(var i=0;i<pts.length-1;i++){var g=new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(pts[i][0],0.1,pts[i][2]),new THREE.Vector3(pts[i+1][0],0.1,pts[i+1][2])]);scene.add(new THREE.Line(g,lm));}var comps=[{x:-3,z:-3,c:0xff4444},{x:3,z:-3,c:0x44ff44},{x:3,z:3,c:0x4444ff},{x:-3,z:3,c:0xffff44}];comps.forEach(function(cp){scene.add(new THREE.Mesh(new THREE.BoxGeometry(.8,.4,.4),new THREE.MeshBasicMaterial({color:cp.c}))).position.set(cp.x,.3,cp.z);});var els=[];for(var i=0;i<12;i++){var e=new THREE.Mesh(new THREE.SphereGeometry(.08),new THREE.MeshBasicMaterial({color:0xffff00}));e._t=i*0.5;scene.add(e);els.push(e);}function animar(){els.forEach(function(e){e._t+=.04;var p=e._t%4;if(p<1)e.position.set(-5+p*10,.2,-3);else if(p<2)e.position.set(5,.2,-3+(p-1)*6);else if(p<3)e.position.set(5-(p-2)*10,.2,3);else e.position.set(-5,.2,3-(p-3)*6);});}`,
transformador:`cam.position.set(6,4,8);cam.lookAt(0,1.5,0);var nucleo=new THREE.Mesh(new THREE.BoxGeometry(3.5,3,.4),new THREE.MeshBasicMaterial({color:0x444444,wireframe:true}));nucleo.position.y=1.5;scene.add(nucleo);var bobL=[];var bobR=[];for(var i=0;i<10;i++){var t=new THREE.Mesh(new THREE.TorusGeometry(.5,.04,8,24),new THREE.MeshBasicMaterial({color:0xff6600,transparent:true,opacity:.7}));t.position.set(-1,0.4+i*.25,0);t.rotation.y=Math.PI/2;scene.add(t);bobL.push(t);}for(var i=0;i<16;i++){var t=new THREE.Mesh(new THREE.TorusGeometry(.4,.03,8,24),new THREE.MeshBasicMaterial({color:0x4fc3f7,transparent:true,opacity:.7}));t.position.set(1,0.3+i*.17,0);t.rotation.y=Math.PI/2;scene.add(t);bobR.push(t);}function animar(){var t=Date.now()*.003;bobL.forEach(function(b,i){b.material.opacity=.4+Math.sin(t+i*.3)*.3;});bobR.forEach(function(b,i){b.material.opacity=.4+Math.sin(t+i*.2+1)*.3;});}`,

// ======================== MULTIMEDIA ========================
var mediaWindow = null;

function abrirMedia(media){
  if(media.tipo==='youtube'){
    // Intentar extraer video ID o usar embed de búsqueda
    var query = media.query || '';
    var embedUrl = 'https://www.youtube.com/embed?listType=search&list=' + encodeURIComponent(query);
    // Mostrar reproductor integrado
    document.getElementById('media-panel').style.display='block';
    document.getElementById('media-frame').src = embedUrl;
  } else if(media.tipo==='imagenes'){
    // Imágenes: abrir en ventana externa (no se puede embeber Google)
    if(mediaWindow && !mediaWindow.closed){ mediaWindow.location.href=media.url; mediaWindow.focus(); }
    else { mediaWindow=window.open(media.url,'astra_media'); }
  }
}

function cerrarMedia(){
  document.getElementById('media-panel').style.display='none';
  document.getElementById('media-frame').src='';
}

// ======================== RECONOCIMIENTO DE IMÁGENES ========================
function enviarImagen(inputEl){
  var file = inputEl.files[0];
  if(!file) return;
  
  // Mostrar preview en el chat
  var reader = new FileReader();
  reader.onload = function(e){
    var imgDiv = document.createElement('div');
    imgDiv.className = 'msg msg-user';
    imgDiv.innerHTML = '<img src="'+e.target.result+'" style="max-width:200px;max-height:150px;border-radius:10px;"/>';
    chat.appendChild(imgDiv);
    chat.scrollTop = chat.scrollHeight;
    
    // Enviar al backend para análisis
    orb3D_pensar();
    var formData = new FormData();
    formData.append('imagen', file);
    
    fetch('/api/analyze-image', {method:'POST', body: formData})
      .then(r=>r.json()).then(d=>{
        orb3D_hablar();
        agregarMsg(d.respuesta, 'astra');
        hablar(d.respuesta, d.audio);
        setTimeout(orb3D_idle, 6000);
      }).catch(e=>{
        orb3D_idle();
        agregarMsg('No pude analizar la imagen.', 'sistema');
      });
  };
  reader.readAsDataURL(file);
  inputEl.value = ''; // reset
}

// SALUDO
var h=new Date().getHours();
agregarMsg(h>=5&&h<12?'Buenos días, sistemas en línea.':h<19?'Buenas tardes, todo operativo.':'Buenas noches, aquí estoy.','astra');
setTimeout(function(){var s=document.querySelector('.msg-astra').textContent;fetch('/api/tts',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({texto:s})}).then(r=>r.json()).then(d=>{hablar(s,d.audio);}).catch(()=>{});},800);
